<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Skills Pack Chat" />
  <title>Skills Pack</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 id="pack-name">Skills Pack</h1>
        <p id="pack-desc">Loading...</p>
      </div>

      <div class="sidebar-section">
        <h3>Skills</h3>
        <ul id="skills-list"></ul>
      </div>

      <div class="sidebar-section">
        <h3>API KEYS</h3>
        <div class="provider-select-wrapper">
          <select id="provider-select">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
          </select>
        </div>
        <div class="api-key-form">
          <input type="password" id="api-key-input" placeholder="sk-..." />
        </div>
        <div class="api-key-footer">
          <p id="key-status" class="status-text"></p>
          <button id="save-key-btn">Save</button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>SLACK</h3>
        <div class="api-key-form">
          <input type="password" id="slack-bot-token-input" placeholder="xoxb-..." />
        </div>
        <div class="api-key-form" style="margin-top: 8px;">
          <input type="password" id="slack-signing-secret-input" placeholder="Signing secret" />
        </div>
        <div class="api-key-form" style="margin-top: 8px;">
          <input type="password" id="slack-app-token-input" placeholder="xapp-... (optional)" />
        </div>
        <div class="api-key-form" style="margin-top: 8px;">
          <input type="text" id="slack-events-path-input" placeholder="/api/slack/events" />
        </div>
        <label style="display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 13px; cursor: pointer;">
          <input type="checkbox" id="slack-use-thread-input" />
          Reply in thread
        </label>
        <div class="api-key-footer">
          <p id="slack-status" class="status-text"></p>
          <button id="save-slack-btn">Save</button>
        </div>
        <div class="provider-select-wrapper" style="margin-top: 10px;">
          <select id="slack-channel-select">
            <option value="">Select a Slack channel...</option>
          </select>
        </div>
        <div class="api-key-form" style="margin-top: 6px;">
          <input type="text" id="slack-channel-id-input" placeholder="Or enter channel ID (e.g. C0123456789)" />
        </div>
        <div class="api-key-footer" style="margin-top: 6px;">
          <p id="slack-binding-status" class="status-text"></p>
          <button id="refresh-channels-btn">Refresh</button>
        </div>
        <div class="api-key-footer" style="margin-top: 6px;">
          <p id="session-id-text" class="status-text"></p>
          <button id="copy-session-id-btn">Copy SID</button>
        </div>
        <div class="api-key-footer" style="margin-top: 6px;">
          <p id="slack-current-binding" class="status-text"></p>
          <button id="bind-session-btn">Bind Session</button>
        </div>
        <div class="api-key-footer" style="margin-top: 6px;">
          <p id="slack-deep-link" class="status-text"></p>
          <button id="unbind-session-btn">Unbind</button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>TUNNEL</h3>
        <div class="provider-select-wrapper">
          <select id="tunnel-provider-select">
            <option value="cloudflared">cloudflared</option>
            <option value="ngrok">ngrok</option>
          </select>
        </div>
        <div class="api-key-form" style="margin-top: 8px;">
          <input type="text" id="tunnel-name-input" placeholder="Named tunnel (e.g. skillpack)" />
        </div>
        <div class="api-key-form" style="margin-top: 8px;">
          <input type="number" id="tunnel-port-input" min="1" max="65535" placeholder="26313" />
        </div>
        <div class="api-key-footer">
          <p id="tunnel-status" class="status-text"></p>
          <button id="start-tunnel-btn">Start</button>
        </div>
        <div class="api-key-footer" style="margin-top: 6px;">
          <p id="tunnel-url" class="status-text"></p>
          <button id="stop-tunnel-btn">Stop</button>
        </div>
        <div class="api-key-footer" style="margin-top: 6px;">
          <p id="tunnel-callback-url" class="status-text"></p>
          <button id="copy-callback-btn">Copy URL</button>
        </div>
        <div class="api-key-footer" style="margin-top: 8px; align-items: flex-start;">
          <p id="slack-health-summary" class="status-text"></p>
          <button id="refresh-health-btn">Refresh</button>
        </div>
        <div class="api-key-form" style="margin-top: 6px;">
          <div id="slack-health-details" class="status-text"></div>
        </div>
      </div>
    </aside>

    <main id="chat-area" class="mode-welcome">
      <div id="welcome-view">
        <div id="welcome-content"></div>
      </div>
      <div id="chat-view">
        <div id="messages"></div>
      </div>
      <div id="input-area">
        <div class="input-container">
          <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
          <button id="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
            </svg>
          </button>
        </div>
        <p class="powered-by">
          Powered by
          <a href="https://skillpack.sh" target="_blank" rel="noopener noreferrer">SkillPack.sh</a>
        </p>
      </div>
    </main>
  </div>
  <script src="marked.min.js"></script>
  <script src="app.js?v=8"></script>
</body>

</html>
